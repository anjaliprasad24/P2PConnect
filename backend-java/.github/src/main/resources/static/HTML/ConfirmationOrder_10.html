<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed - College Connect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #00796b;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Main Content Container */
        .confirmation-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 60px 40px;
            border-radius: 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        /* Logo Container */
        .logo-container {
            margin-bottom: 30px;
            position: relative;
        }

        .logo-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 60px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        /* Success Message */
        .success-title {
            font-size: 32px;
            font-weight: bold;
            color: #2E7D32;
            margin-bottom: 10px;
        }
        
        .peer-message {
            font-size: 18px;
            color: #666;
            font-style: italic;
            margin-bottom: 30px;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #66ead2 0%, #4ba27f 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .confirmation-container {
                padding: 40px 30px;
                margin: 20px;
            }
            .logo-icon {
                width: 100px;
                height: 100px;
                font-size: 40px;
            }
            .success-title {
                font-size: 28px;
            }
            .peer-message {
                font-size: 16px;
            }
            .action-buttons {
                flex-direction: column;
                align-items: center;
            }
            .btn {
                width: 200px;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .confirmation-container {
                padding: 30px 20px;
            }
            .logo-icon {
                width: 80px;
                height: 80px;
                font-size: 32px;
            }
            .success-title {
                font-size: 24px;
            }
            .success-subtitle {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="confirmation-container">
        <div class="logo-container">
            <div class="logo-icon">
                ✓
            </div>
        </div>

        <h1 class="success-title">Order Confirmed!</h1>
        <p class="peer-message">Now you are an official peer! 🎉</p>

        <div class="action-buttons">
            <button class="btn btn-primary" onclick="window.location.href='HomePage_01.html'">
                🏠 Back to Home
            </button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Log confirmation message to the console
            console.log('🎉 Celebration! Order confirmed successfully!');
        });

        // Add click sound effect to buttons (placeholder)
        document.querySelectorAll('.btn').forEach(button => {
            button.addEventListener('click', function() {
                console.log('Button clicked: ', this.textContent.trim());
            });
        });
    </script>
</body>
</html>
