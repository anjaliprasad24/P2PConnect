<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - College Connect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #00796b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Main Container */
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
            width: 90%;
            max-width: 450px;
            padding: 50px 40px;
            position: relative;
            z-index: 10;
        }

        /* Header */
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-container {
            margin-bottom: 20px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #388E3C, #4CAF50);
            border-radius: 50%;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(46, 125, 50, 0.3);
        }
        /* ADD APP LOGO ICON IMAGE HERE - Replace background and content with: background-image: url('path/to/logo.png'); background-size: cover; */

        .welcome-text h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .welcome-text p {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
        }

        /* Form Styles */
        .login-form {
            width: 100%;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 15px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
            color: #333;
        }

        .form-input:focus {
            outline: none;
            border-color: #4CAF50;
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.2);
            transform: translateY(-2px);
        }

        .form-input::placeholder {
            color: #aaa;
            font-style: italic;
        }

        /* Dropdown Select Styles */
        .form-select {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e1e5e9;
            border-radius: 15px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.8);
            color: #333;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 4 5'><path fill='%23666' d='m2 0-2 2h4zm0 5 2-2h-4z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 12px;
        }

        .form-select:focus {
            outline: none;
            border-color: #4CAF50;
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.2);
            transform: translateY(-2px);
        }

        .form-select option {
            padding: 10px;
            background: white;
            color: #333;
        }

        /* Input Icons */
        .input-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 18px;
            pointer-events: none;
            margin-top: 12px;
            transition: color 0.3s ease;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #388E3C, #4CAF50);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            box-shadow: 0 8px 25px rgba(46, 125, 50, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(46, 125, 50, 0.4);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        /* Security Badge */
        .security-badge {
            text-align: center;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #888;
            font-size: 12px;
        }

        .security-icon {
            color: #4CAF50;
            font-size: 16px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .login-container {
                margin: 20px;
                padding: 40px 30px;
            }
            .welcome-text h1 {
                font-size: 24px;
            }
            .form-input, .form-select {
                padding: 12px 16px;
                font-size: 15px;
            }
            .submit-btn {
                padding: 14px;
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 25px;
            }
            .logo {
                width: 70px;
                height: 70px;
                font-size: 28px;
            }
            .welcome-text h1 {
                font-size: 22px;
            }
            .welcome-text p {
                font-size: 14px;
            }
            .form-input, .form-select {
                padding: 12px 15px;
            }
        }

        /* Success Message Styling */
        .success-animation {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            z-index: 1000;
        }

        .success-checkmark {
            width: 60px;
            height: 60px;
            background: #4CAF50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 30px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo-container">
                <div class="logo">
                    P2P
                    </div>
            </div>
            <div class="welcome-text">
                <h1>Your Details</h1>
                <p>Join your college peer-to-peer marketplace</p>
            </div>
        </div>

        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" placeholder="Enter your full name" required>
                
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" placeholder="Enter your college email" required>
                
            </div>

            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-input" placeholder="Enter your phone number" required>
                
            </div>

            <div class="form-group">
                <label class="form-label">Hostel Name</label>
                <select class="form-select" required>
                    <option value="" disabled selected>Select your hostel</option>
                    <option value="adhiyaman">Adhiyaman</option>
                    <option value="agasthiyar">Agasthiyar</option>
                    <option value="began">Began</option>
                    <option value="esq-a-block">ESQ A Block</option>
                    <option value="esq-b-block">ESQ B Block</option>
                    <option value="kaari">Kaari</option>
                    <option value="kalpana-chawla">Kalpana Chawla</option>
                    <option value="kopperundevi-m-block">Kopperundevi (M Block)</option>
                    <option value="malligai-block">Malligai Block</option>
                    <option value="manoranjitham">Manoranjitham</option>
                    <option value="meenakshi">Meenakshi</option>
                    <option value="mullai">Mullai</option>
                    <option value="n-block">N Block</option>
                    <option value="nelson-mandela">Nelson Mandela</option>
                    <option value="oori">Oori</option>
                    <option value="paari">Paari</option>
                    <option value="sannasi">Sannasi</option>
                    <option value="senbagam-block">Senbagam Block</option>
                    <option value="thamarai-block">Thamarai Block</option>
                    <option value="na">N/A (Day Scholar)</option>
                </select>
                
            </div>

            <button type="submit" class="submit-btn">
                Create Account
            </button>
        </form>

        <div class="security-badge">
            <span class="security-icon">🔒</span>
            <span>Your information is secure and encrypted</span>
        </div>
    </div>

    <div class="success-animation" id="successAnimation">
        <div class="success-checkmark">✓</div>
        <h3>Account Created!</h3>
        <p>Redirecting to homepage...</p>
    </div>

    <script src="../scripts/LoginPage_02.js"></script>
</body>
</html>
