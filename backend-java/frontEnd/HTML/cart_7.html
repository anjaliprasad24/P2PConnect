<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - P2P</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: #2d3748;
        }

        /* --- Navigation Bar --- */
        .navbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            background: #00796b;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .app-logo {
            display: flex;
            align-items: center;
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
            text-decoration: none;
        }
        .logo-icon {
            width: 40px;
            height: 40px;
            background-color: #ffffff;
            border-radius: 12px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #00796b;
            font-weight: 700;
        }
        .navbar .menu-btn { margin-left: auto; }
        .menu-btn {
            background: none; border: none; color: #fff; font-size: 24px;
            cursor: pointer; padding: 8px; border-radius: 5px;
            transition: background-color 0.25s ease;
        }
        .menu-btn:hover { background-color: rgba(255, 255, 255, 0.1); }

        /* --- Side Menu & Overlay --- */
        .side-menu {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100vh;
            background: #ffffff; box-shadow: -2px 0 10px rgba(0, 0, 0, 0.08);
            transition: right 0.3s ease-in-out; z-index: 1001; padding: 20px;
        }
        .side-menu.active { right: 0; }
        .menu-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #e0e0e0;
        }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #576574; }
        .menu-item {
            display: block; padding: 15px 0; color: #2c3e50; font-size: 16px; text-decoration: none;
            border-bottom: 1px solid #f0f0f0; transition: color 0.25s ease;
        }
        .menu-item:hover { color: #00796b; }
        .menu-item:last-child { color: #e67e22; border-bottom: none; }
        .overlay {
            position: fixed; top: 0; left: 0; height: 100%; width: 100%;
            background: rgba(0, 0, 0, 0.4); opacity: 0; visibility: hidden;
            z-index: 1000; transition: visibility 0.3s ease, opacity 0.3s ease;
        }
        .overlay.active { opacity: 1; visibility: visible; }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .page-title {
            text-align: center;
            margin-bottom: 2rem;
        }
        .page-title h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00897b, #00695c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        .page-title p { color: #64748b; font-size: 1.1rem; }

        /* Cart Layout */
        .cart-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            margin-top: 2rem;
        }
        .cart-items {
            background: white; border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .cart-header {
            background: linear-gradient(135deg, #00897b, #00695c); color: white;
            padding: 1.5rem 2rem; display: flex; justify-content: space-between;
            align-items: center;
        }
        .cart-header h2 { font-size: 1.5rem; font-weight: 600; }
        .item-count {
            background: rgba(255, 255, 255, 0.2); padding: 4px 12px;
            border-radius: 20px; font-size: 0.9rem; font-weight: 500;
        }
        .cart-item {
            padding: 1.5rem 2rem; border-bottom: 1px solid #e2e8f0;
            display: grid; grid-template-columns: 80px 1fr auto;
            gap: 1.5rem; align-items: center; transition: all 0.3s ease;
        }
        .cart-item:hover { background: #f8fafc; transform: translateX(4px); }
        .cart-item:last-child { border-bottom: none; }

        /* --- CHANGE 1: Updated CSS for the item image --- */
        .item-image {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover; /* Ensures the image covers the area without distortion */
            background: #e2e8f0; /* Fallback color if image fails to load */
        }

        .item-details { flex: 1; }
        .item-name { font-size: 1.2rem; font-weight: 600; color: #2d3748; margin-bottom: 0.5rem; }
        .item-description { color: #64748b; font-size: 0.9rem; margin-bottom: 0.75rem; line-height: 1.4; }
        .item-meta { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .quantity-controls {
            display: flex; align-items: center; gap: 0.5rem;
            background: #f1f5f9; border-radius: 8px; padding: 4px;
        }
        .qty-btn {
            width: 28px; height: 28px; border: none; background: white; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: 600; color: #00796b; transition: all 0.2s ease;
        }
        .qty-btn:hover { background: #00796b; color: white; transform: scale(1.1); }
        .qty-display { min-width: 40px; text-align: center; font-weight: 600; color: #2d3748; }
        .item-price { font-size: 1.5rem; font-weight: 700; color: #00796b; }
        .item-actions { display: flex; flex-direction: column; gap: 0.75rem; align-items: flex-end; }

        .buy-now-btn {
            background: linear-gradient(135deg, #10b981, #059669); color: white; border: none;
            padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
        }
        .buy-now-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4); }
        .remove-btn {
            background: none; border: none; color: #ef4444; cursor: pointer;
            font-size: 1.2rem; padding: 8px; border-radius: 6px; transition: all 0.2s ease;
        }
        .remove-btn:hover { background: #fef2f2; transform: scale(1.1); }

        /* Cart Summary */
        .cart-summary {
            background: white; border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1); padding: 2rem;
            height: fit-content; position: sticky;
            top: calc(74px + 2rem);
        }
        .summary-title { font-size: 1.5rem; font-weight: 700; color: #2d3748; margin-bottom: 1.5rem; text-align: center; }
        .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid #e2e8f0; }
        .summary-row:last-of-type { border-bottom: 2px solid #00796b; font-weight: 700; font-size: 1.1rem; color: #2d3748; }
        .summary-row.total { font-size: 1.3rem; padding-top: 1rem; border-bottom: none; }
        .checkout-btn {
            width: 100%; background: linear-gradient(135deg, #00897b, #00695c); color: white;
            border: none; padding: 16px; border-radius: 12px; font-size: 1.1rem;
            font-weight: 600; cursor: pointer; margin-top: 1.5rem;
            transition: all 0.3s ease; box-shadow: 0 6px 20px rgba(0, 121, 107, 0.3);
        }
        .checkout-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0, 121, 107, 0.4); }
        .continue-shopping { text-align: center; margin-top: 1rem; }
        .continue-shopping a { color: #00796b; text-decoration: none; font-weight: 500; transition: all 0.2s ease; }
        .continue-shopping a:hover { color: #004d40; text-decoration: underline; }

        /* Empty Cart */
        .empty-cart { text-align: center; padding: 4rem 2rem; background: white; border-radius: 16px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1); }
        .empty-cart-icon { font-size: 4rem; color: #cbd5e0; margin-bottom: 1rem; }
        .empty-cart h3 { font-size: 1.5rem; color: #4a5568; margin-bottom: 0.5rem; }
        .empty-cart p { color: #718096; margin-bottom: 2rem; }
        .shop-now-btn {
            background: linear-gradient(135deg, #00897b, #00695c); color: white;
            padding: 12px 24px; border-radius: 8px; text-decoration: none;
            font-weight: 600; transition: all 0.3s ease; display: inline-block;
        }
        .shop-now-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 121, 107, 0.3); }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .cart-layout { grid-template-columns: 1fr; gap: 1.5rem; }
            .cart-summary { order: -1; position: static; }
        }
        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .cart-item { grid-template-columns: 1fr; gap: 1rem; text-align: center; }
            .item-actions { align-items: center; flex-direction: row; justify-content: center; }
            .page-title h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="HomePage_01.html" class="app-logo">
            <div class="logo-icon">C</div>
            P2P Connect
        </a>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
    </nav>

    <div class="side-menu" id="sideMenu">
        <div class="menu-header">
            <h3>Menu</h3>
            <button class="close-btn" onclick="toggleMenu()">✕</button>
        </div>
        <a href="LoginPage_02.html" class="menu-item" >👤 Account</a>
        <a href="cart_7.html" class="menu-item" >🛒 Cart</a>
        <a href="uploadprod_3.html" class="menu-item" >💰 Sell</a>
        <a href="help.html" class="menu-item" >❓ Help</a>
        <a href="LoginPage_02.html" class="menu-item" >🚪 Log Out</a>
    </div>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <main class="container">
        <div class="page-title">
            <h1>Your Shopping Cart</h1>
            <p>Review your items and proceed to checkout</p>
        </div>

        <div class="empty-cart" id="emptyCart" style="display: none;">
            <div class="empty-cart-icon">🛒</div>
            <h3>Your cart is empty</h3>
            <p>Looks like you haven't added any items to your cart yet.</p>
            <a href="HomePage_01.html" class="shop-now-btn">Start Shopping</a>

        </div>

        <div class="cart-layout" id="cartLayout">
            <div class="cart-items">
                <div class="cart-header">
                    <h2>Cart Items</h2>
                    <span class="item-count" id="itemCount">3 items</span>
                </div>
                <div id="cartItemsList">
                    </div>
            </div>

            <div class="cart-summary">
                <h3 class="summary-title">Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">₹0</span>
                </div>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="total">₹0</span>
                </div>
                <button class="checkout-btn" onclick="proceedToCheckout()">
                    Proceed to Checkout
                </button>
                <div class="continue-shopping">
                    <a href="HomePage_01.html">← Back to Home</a>

                </div>
            </div>
        </div>
    </main>

     <!-- Replace your <script> with this in the cart page -->
        <script src="../scripts/cart_7.js"></script>

</body>
</html>
